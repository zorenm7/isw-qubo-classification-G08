design_choices:
  correlation_computation: "We utilized Spearman rank correlation to capture monotonic, non-linear relationships between features and the target variable, avoiding Pearson's strict linearity assumption."
  QUBO_optimization_algorithm:
    algorithm_name: "Simulated Annealing"
    library_used: "dwave-neal"
    reason_for_choice: "It provides an excellent heuristic approximation for solving dense QUBO matrices on classical hardware without requiring external API calls or quantum access."
  classification_algorithm:
    algorithm_name: "Random Forest, Logistic Regression, Gradient Boosting"
    library_used: "scikit-learn"
    reason_for_choice: "Random Forest was mandatory. We added Logistic Regression as a solid baseline and Gradient Boosting for its high performance on tabular datasets."
  gui_development: "We chose Streamlit over Tkinter because it enables rapid prototyping of modern, responsive, data-driven web applications with minimal boilerplate code."
  problems_encountered:
    - problem: "TypeError during JSON serialization of final statistics (NumPy np.int8 types were not JSON serializable)."
      solution: "We manually intercepted the NumPy array outputs from dimod/neal and explicitly cast them to standard Python native ints using list comprehensions before calling json.dump()."
  notes: "The modular architecture allowed us to test each script individually before connecting them through the Streamlit interface."

